aid: saul-ewing
name: Saul Ewing LLP
description: >-
  Saul Ewing LLP is a U.S.-based law firm founded in 1921 as Saul, Ewing,
  Remick & Saul, with more than 450 attorneys across 17 U.S. offices spanning
  the Mid-Atlantic, Northeast, Midwest, Florida, and California. The firm
  serves clients across 40+ industries with practice strengths in litigation,
  corporate and M&A, bankruptcy and restructuring, real estate, public
  finance, life sciences, financial services, intellectual property, labor
  and employment, and cybersecurity and privacy. Saul Ewing does not publish
  a public developer API, SDK, OpenAPI specification, or machine-readable
  data product; its public technology surface is limited to its corporate
  website, a HighQ-powered client portal, the SEquel Alumni Portal at
  alumni.saul.com, employee remote-access tooling, and a small set of
  practice-specific blogs (Construction Industry Counselor, OZ and EB-5
  Investments, Legacy Matters, The Friday Five). Two empty GitHub
  organizations (Saul-Ewing and saulewing) exist with zero public
  repositories.
